<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Testing Methods</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <nav class="navbar main-nav sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold title-font fs-4" href="#" onclick="showHome(event)">
                Lab Testing Methods
            </a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container my-5">

        <!-- Home Section -->
        <section id="home-section" class="fade-in">
            <div data-aos="fade-down" class="text-center mb-5">
                <h1 class="fw-bold mb-3 method-title">OUR METHODS</h1>
                <div class="input-group search-container p-1 mx-auto" style="max-width: 500px;">
                    <span class="input-group-text bg-transparent border-0 text-muted" id="search-addon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control border-0 ps-0 text-secondary" placeholder="Search methods...">
                </div>
            </div>

            <div class="row justify-content-center px-lg-3" id="methodsGrid" style="row-gap: 4rem;">
                <!-- Cards will be injected here by JS -->
            </div>
        </section>

        <!-- Method Detail Section -->
        <section id="detail-section" class="d-none fade-in">
            
            <!-- Top Row: Image & Short Details -->
            <div class="row g-5 align-items-center mb-5">
                <!-- Left Image -->
                <div class="col-lg-5 text-center" data-aos="fade-right">
                    <div class="detail-img-wrapper mx-auto">
                        <img id="detailImage" src="" alt="Detail Image" loading="lazy">
                    </div>
                </div>
                
                <!-- Right Content Area -->
                <div class="col-lg-7" data-aos="fade-left">
                    <h1 id="methodTitle" class="method-title mb-1">METHOD TITLE</h1>
                    <div class="method-category" id="methodCategory">CATEGORY: Lab Testing Procedure</div>
                    
                    <div class="mb-4 text-muted" style="font-size: 0.95rem; line-height: 1.6;" id="methodShortDesc">
                        <!-- Short objective/description goes here -->
                    </div>

                    <div class="features-title">FEATURES & MATERIALS:</div>
                    <ul class="features-list mb-4" id="methodMaterials">
                        <!-- Materials go here -->
                    </ul>


                </div>
            </div>

            <!-- Bottom Description Tab -->
            <div class="desc-tab-container" data-aos="fade-up">
                <div class="desc-tab-header">Description</div>
                <div class="desc-tab-body">
                    <div class="row g-5">
                        <div class="col-lg-7 desc-content" id="methodLongDesc">
                            <!-- All detailed content (Procedure, Reagents, etc) goes here -->
                        </div>
                        <div class="col-lg-5">
                            <img src="" class="desc-img shadow-sm" alt="Method Detail" id="detailLargeImage" loading="lazy">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-5 pt-3">
                <button class="btn btn-outline-secondary px-4 py-2" onclick="showHome(event)">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Methods
                </button>
            </div>
        </section>

    </main>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
