<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Testing Methods</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <!-- Header -->
    <nav class="navbar navbar-dark blue-header shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="showHome(event)">
                <i class="fa-solid fa-flask me-2"></i>Lab Testing Methods
            </a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container my-5">
        
        <!-- Home Section -->
        <section id="home-section" class="fade-in">
            <h1 class="fw-bold mb-2 text-dark">Lab Testing Methods</h1>
            <p class="text-muted mb-4 fs-5">A digital lab manual for standard testing procedures</p>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden mb-4 p-4 p-md-5 bg-white">
                <div class="input-group mb-4 search-container">
                    <span class="input-group-text bg-white border-end-0 text-muted" id="search-addon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control border-start-0 ps-0 form-control-lg text-secondary" placeholder="Search methods..." aria-label="Search" aria-describedby="search-addon">
                </div>

                <div class="table-responsive rounded-3 border">
                    <table class="table table-hover mb-0 custom-table">
                        <thead class="table-blue">
                            <tr>
                                <th scope="col" width="10%">S.No</th>
                                <th scope="col">Title</th>
                            </tr>
                        </thead>
                        <tbody id="methodsTableBody">
                            <!-- Rows will be populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- Method Detail Section -->
        <section id="detail-section" class="d-none fade-in">
            <button class="btn btn-outline-primary mb-4 back-btn rounded-pill px-4 fw-medium" onclick="showHome(event)">
                <i class="fa-solid fa-arrow-left me-2"></i> Back to Home
            </button>
            
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4 px-md-5 mt-2">
                    <h2 id="methodTitle" class="fw-bold text-dark mb-0">Method Title</h2>
                </div>
                <div class="card-body p-4 p-md-5 pt-4">
                    <!-- Image Gallery -->
                    <div class="row mb-5 g-3" id="imageGallery">
                        <div class="col-md-4">
                            <div class="gallery-img-box rounded-3 bg-light d-flex align-items-center justify-content-center text-muted">
                                <div class="text-center">
                                    <i class="fa-solid fa-image fa-2x mb-2 d-block mx-auto text-opacity-50"></i>
                                    <small class="fw-medium text-opacity-50">Image 1</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="gallery-img-box rounded-3 bg-light d-flex align-items-center justify-content-center text-muted">
                                <div class="text-center">
                                    <i class="fa-solid fa-image fa-2x mb-2 d-block mx-auto text-opacity-50"></i>
                                    <small class="fw-medium text-opacity-50">Image 2</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="gallery-img-box rounded-3 bg-light d-flex align-items-center justify-content-center text-muted">
                                <div class="text-center">
                                    <i class="fa-solid fa-image fa-2x mb-2 d-block mx-auto text-opacity-50"></i>
                                    <small class="fw-medium text-opacity-50">Image 3</small>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-5">
                        <div class="col-lg-8">
                            <h5 class="fw-bold text-primary mb-3">Description</h5>
                            <p id="methodDescription" class="mb-5 text-secondary lh-lg fs-6"></p>

                            <h5 class="fw-bold text-primary mb-3">Procedure</h5>
                            <ol id="methodProcedure" class="procedure-list mb-4 text-secondary lh-lg ps-3 fs-6">
                                <!-- Procedure items -->
                            </ol>
                        </div>
                        
                        <div class="col-lg-4">
                            <div class="bg-light rounded-4 p-4 mb-4 border material-card">
                                <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-flask-vial me-2"></i>Materials Required</h5>
                                <ul id="methodMaterials" class="materials-list text-secondary mb-0 ps-3">
                                    <!-- Material items -->
                                </ul>
                            </div>
                            
                            <div id="formulaSection" class="bg-light rounded-4 p-4 border mb-4 d-none">
                                <h5 class="fw-bold text-primary mb-3"><i class="fa-solid fa-calculator me-2"></i>Formula</h5>
                                <p id="methodFormula" class="mb-0 text-secondary"></p>
                            </div>
                            
                            <div id="notesSection" class="alert alert-info rounded-4 border-0 d-none">
                                <h5 class="fw-bold text-info-emphasis mb-2"><i class="fa-solid fa-circle-info me-2"></i>Notes</h5>
                                <p id="methodNotes" class="mb-0 text-info-emphasis"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
