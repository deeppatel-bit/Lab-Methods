<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Testing Methods</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <nav class="navbar main-nav sticky-top py-3 glass-nav">
        <div class="container d-flex justify-content-between align-items-center flex-wrap">
            <a class="navbar-brand fw-bold title-font fs-4 d-flex align-items-center gap-2" href="#"
                onclick="showHome(event)">
                <i class="fa-solid fa-flask-vial text-primary"></i> Lab Methods
            </a>
            <div class="nav-search-wrapper mt-3 mt-md-0">
                <div class="input-group search-container glass-search">
                    <span class="input-group-text bg-transparent border-0 text-muted" id="search-addon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" class="form-control border-0 ps-0 text-secondary"
                        placeholder="Search procedures...">
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container my-5">

        <!-- Home Section -->
        <section id="home-section" class="fade-in">
            <div data-aos="fade-down" class="text-center mb-5 hero-section">
                <h1 class="fw-bold mb-3 method-title gradient-text">Lab Testing Methods</h1>
                <p class="text-muted hero-subtitle mx-auto">Comprehensive standard operating procedures and quality
                    testing protocols for precise analysis.</p>
            </div>

            <div class="row justify-content-center px-lg-3" id="methodsGrid" style="row-gap: 4rem;">
                <!-- Cards will be injected here by JS -->
            </div>
        </section>

        <!-- Method Detail Section -->
        <section id="detail-section" class="d-none fade-in">

            <div class="mb-4">
                <button class="btn btn-link text-muted text-decoration-none px-0" onclick="showHome(event)">
                    <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
                </button>
            </div>

            <!-- Compact Detail Hero -->
            <div class="detail-hero-card mb-4 p-4 p-md-5">
                <div class="row align-items-center">
                    <div class="col-md-3 text-center mb-4 mb-md-0">
                        <div class="detail-img-wrapper">
                            <img id="detailImage" src="" alt="Detail Image" loading="lazy">
                        </div>
                    </div>
                    <div class="col-md-9 ps-md-4">
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <span class="method-badge bg-primary-subtle text-primary"><i class="fa-solid fa-flask"></i>
                                <span id="methodCategory">Procedure</span></span>
                            <span class="method-badge bg-success-subtle text-success"><i
                                    class="fa-solid fa-layer-group"></i> Industrial Standard</span>
                            <span class="method-badge bg-warning-subtle text-warning"><i
                                    class="fa-regular fa-clock"></i> 30-45 Mins</span>
                        </div>
                        <h1 id="methodTitle" class="detail-title mb-3">METHOD TITLE</h1>
                        <p class="text-muted mb-0" id="methodShortDesc" style="font-size: 1.05rem;"></p>
                    </div>
                </div>
            </div>

            <!-- Horizontal Materials Section -->
            <div class="materials-section mb-5" data-aos="fade-up">
                <h5 class="section-title"><i class="fa-solid fa-toolbox me-2"></i> Required Equipment & Materials</h5>
                <div class="materials-scroll-container">
                    <ul class="features-list" id="methodMaterials">
                        <!-- Materials injected via JS -->
                    </ul>
                </div>
            </div>

            <!-- Procedure & Description Section -->
            <div class="procedure-section" data-aos="fade-up">
                <!-- Language Switcher -->
                <div class="language-tabs mb-4">
                    <button class="lang-tab active" onclick="switchLanguage('en')">English</button>
                    <button class="lang-tab" onclick="switchLanguage('gu')">Gujarati</button>
                </div>

                <div class="desc-tab-container p-4 p-md-5">
                    <div id="methodLongDescEn" class="lang-content">
                        <!-- English Step-by-Step UI injected via JS -->
                    </div>
                    <div id="methodLongDescGu" class="lang-content d-none">
                        <!-- Gujarati Step-by-Step UI injected via JS -->
                    </div>
                </div>
            </div>

        </section>

    </main>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
